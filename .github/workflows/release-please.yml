# release-please: リリースバージョンの管理 GitHub Release / tag の作成
#
# RELEASE_PLEASE_TOKEN (PAT) が必要:
#   - Fine-grained PAT: Contents/Pull requests/Actions の Read and write
# GITHUB_TOKEN で tag を付けると他ワークフローが起動しないため PAT を使う
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────
  # Release Please
  # PAT による tag push で CD Build が起動する
  # GHCR への semver retag は CD Build 完了後に cd-retag.yml が実行する
  # ─────────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
