name: CI

# 並行実行の制御
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # 同一ワークフローで、ブランチからの実行であることを認識
  cancel-in-progress: true  # 同じgroupでに属する新しいワークフローがトリガーされたとき、古いワークフローを強制的にキャンセルする

# ワークフローのトリガー条件
on:
  # PRされた場合
  pull_request:
    branches: [main]

permissions:
  contents: read

# jobは基本的に並列実行
# stepsは上から順に直列実行
jobs:
  # 変更されたファイルパスを検知、どのジョブを実行するかを制御 pathsという名前は任意
  paths:
    name: Paths filter
    runs-on: ubuntu-latest
    # 判定結果をoutputsに格納
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      worker: ${{ steps.filter.outputs.worker }}
    # ワークフローのステップ
    steps:
      - uses: actions/checkout@v4 # ソースコードを実行環境にチェックアウト
      - uses: dorny/paths-filter@v3 # 差分検出
        id: filter
        with:
          # 判定の定義
          # CIの定義ファイル自体に変更があった場合、全てのテストを実行
          # API仕様の変更によるテストも実行
          filters: |
            backend:
              - 'orchestrator/backend/**'
              - 'orchestrator/compose.*.yaml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'orchestrator/frontend/**'
              - 'schema/openapi.json'
              - '.github/workflows/ci.yml'
            worker:
              - 'worker/**'
              - 'schema/openapi.json'
              - '.github/workflows/ci.yml'

  # バックエンドのテスト
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    needs: paths # pathsの判定結果を利用 pathsジョブの正常終了を待つ
    # backendジョブを実行するかどうかの判定
    if: needs.paths.outputs.backend == 'true'
    permissions:
      contents: read
      actions: write # docker/build-push-action の GHA キャッシュ書き込み用
    # 作業ディレクトリ設定
    defaults:
      run:
        working-directory: orchestrator

    # ジョブのメイン処理
    steps:
      - uses: actions/checkout@v4

      # docker buildx(高性能ビルド環境)初期化
      - uses: docker/setup-buildx-action@v3

      # runnerユーザがroot所有の.lockファイルを読めない問題を解消
      - name: Set container user
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"
    

      # Layer 2: PR 間キャッシュ復元 保存先の指定 actions/cache
      - name: Restore cargo cache
        id: cargo-cache
        uses: actions/cache@v4
        with:
          path: |
            orchestrator/.ci-cache/cargo-target
            orchestrator/.ci-cache/cargo-registry
          key: backend-cargo-${{ runner.os }}-${{ hashFiles('orchestrator/backend/Cargo.lock') }}
          restore-keys: |
            backend-cargo-${{ runner.os }}-


      # 依存サービスの起動
      - name: Setup Depend services
        run: |
          docker compose --env-file .env.ci -f compose.base.yaml -f compose.ci.yaml up -d --wait db redis minio
          docker compose --env-file .env.ci -f compose.base.yaml -f compose.ci.yaml run --rm create_buckets        

      # Layer 1: イメージビルド（cargo-chef + GHA cache）
      - name: Build backend (dev)
        uses: docker/build-push-action@v6
        with:
          context: orchestrator/backend
          target: dev
          push: false
          load: true
          tags: orchestrator-backend:dev
          cache-from: type=gha,scope=build-orchestrator-backend
          cache-to: type=gha,mode=max,scope=build-orchestrator-backend

      # Layer 3: cache miss 時、イメージからキャッシュを作成
      # ここで作成されたキャッシュはジョブ終了時にactions/cacheで保存される
      - name: Seed cargo cache from image
        # Layer 2 でキャッシュがヒットしなかった場合のみ実行
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        # イメージから成果物をコピーしてキャッシュとする
        run: |
          mkdir -p .ci-cache/cargo-target .ci-cache/cargo-registry
          cid=$(docker create orchestrator-backend:dev)
          docker cp "$cid:/app/target/." .ci-cache/cargo-target/
          docker cp "$cid:/usr/local/cargo/registry/." .ci-cache/cargo-registry/
          docker rm "$cid"
          # キャッシュをユーザーに紐づける
          sudo chown -R "$(id -u):$(id -g)" .ci-cache


      # DBマイグレーションを実行
      - name: Run database migrations
        run: docker compose --env-file .env.ci -f compose.base.yaml -f compose.ci.yaml run --rm backend sqlx migrate run
      # フォーマットが正しいかどうか
      # コードの静的解析
      # テストの実行
      - name: Run format, clippy, test-integration
        run: docker compose --env-file .env.ci -f compose.base.yaml -f compose.ci.yaml run --rm backend make check
      # OpenAPI JSONの生成
      - name: Run generate OpenAPI JSON
        run: docker compose --env-file .env.ci -f compose.base.yaml -f compose.ci.yaml run --rm backend make generate-openapi

      # OpenAPIの整合性確認
      - name: Check OpenAPI JSON sync
        run: |
          git diff --exit-code $GITHUB_WORKSPACE/schema/openapi.json \
          || (echo "Error: openapi.json is out of sync. Please run schema generator locally and commit." \
          && exit 1)


      # 本番環境ビルド検証
      - name: Build backend for production
        uses: docker/build-push-action@v6
        with:
          context: orchestrator/backend
          target: prod
          push: false
          cache-from: type=gha,scope=build-orchestrator-backend
          cache-to: type=gha,mode=max,scope=build-orchestrator-backend

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    needs: paths
    if: needs.paths.outputs.frontend == 'true'
    permissions:
      contents: read
      actions: write # docker/build-push-action の GHA キャッシュ書き込み用
    defaults:
      run:
        working-directory: orchestrator/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orchestrator/frontend/package-lock.json

      - run: npm ci
      
      # OpenAPIの整合性確認
      - name: Check OpenAPI difference
        run: |
          npx openapi-typescript $GITHUB_WORKSPACE/schema/openapi.json -o src/api/schema.d.ts 
          git diff --exit-code || (echo "Error: Frontend generated types are out of sync." && exit 1)

      # lint
      - run: make check

      # docker buildx(高性能ビルド環境)初期化
      - uses: docker/setup-buildx-action@v3
      # 本番環境ビルド検証
      - name: Build frontend for production
        uses: docker/build-push-action@v6
        with:
          context: orchestrator/frontend
          target: prod
          push: false
          cache-from: type=gha,scope=build-orchestrator-frontend
          cache-to: type=gha,mode=max,scope=build-orchestrator-frontend

  worker:
    name: Worker
    runs-on: ubuntu-latest
    needs: paths
    if: needs.paths.outputs.worker == 'true'
    permissions:
      contents: read
      actions: write # docker/build-push-action の GHA キャッシュ書き込み用
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      # uv インストール
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      
      # 依存関係インストール
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # format check
      # lint check
      - name: Check format, lint
        run: make check

      # OpenAPIの整合性確認
      - name: Check OpenAPI difference
        run: |
          uv run --frozen openapi-python-client generate --meta none --output-path src/server_client --overwrite --path $GITHUB_WORKSPACE/schema/openapi.json
          git diff --exit-code || (echo "Error: Worker generated types are out of sync." && exit 1)

      # docker buildx(高性能ビルド環境)初期化
      - uses: docker/setup-buildx-action@v3
      # 本番環境ビルド検証
      - name: Build worker for production
        uses: docker/build-push-action@v6
        with:
          context: worker
          target: prod
          push: false
          cache-from: type=gha,scope=build-worker
          cache-to: type=gha,mode=max,scope=build-worker