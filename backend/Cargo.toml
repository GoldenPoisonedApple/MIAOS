[package]
name = "server"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web App
axum = "0.8.9"
# データシリアライズ
serde = "1.0.228"
serde_json = "1.0.149"
# 非同期処理
tokio = { version = "1.52.2", features = ["full"] }
# 構造化ログ
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# DB
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-native-tls", "postgres", "time"] }
