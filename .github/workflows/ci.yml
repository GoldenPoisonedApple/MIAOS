name: CI

# 並行実行の制御
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # 同一ワークフローで、ブランチからの実行であることを認識
  cancel-in-progress: true  # 同じgroupでに属する新しいワークフローがトリガーされたとき、古いワークフローを強制的にキャンセルする

# ワークフローのトリガー条件
on:
  # PRされた場合
  pull_request:
    branches: [main]

permissions:
  contents: read

# jobは基本的に並列実行
# stepsは上から順に直列実行
jobs:
  # 変更されたファイルパスを検知、どのジョブを実行するかを制御 pathsという名前は任意
  paths:
    name: Paths filter
    runs-on: ubuntu-latest
    # 判定結果をoutputsに格納
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      worker: ${{ steps.filter.outputs.worker }}
    # ワークフローのステップ
    steps:
      - uses: actions/checkout@v4 # ソースコードを実行環境にチェックアウト
      - uses: dorny/paths-filter@v3 # 差分検出
        id: filter
        with:
          # 判定の定義
          # CIの定義ファイル自体に変更があった場合、全てのテストを実行
          # API仕様の変更によるテストも実行
          filters: |
            backend:
              - 'orchestrator/backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'orchestrator/frontend/**'
              - 'schema/openapi.json'
              - '.github/workflows/ci.yml'
            worker:
              - 'worker/**'
              - 'schema/openapi.json'
              - '.github/workflows/ci.yml'

  # バックエンドのテスト
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    needs: paths # pathsの判定結果を利用 pathsジョブの正常終了を待つ
    # backendジョブを実行するかどうかの判定
    if: needs.paths.outputs.backend == 'true'
    # 作業ディレクトリ設定
    defaults:
      run:
        working-directory: orchestrator/backend

    # 環境変数設定
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/miaos_test
      REDIS_URL: redis://127.0.0.1:6379
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: http://127.0.0.1:9000
      MINIO_BUCKET_NAME: miaos-ci
      MINIO_REGION: us-east-1

    # 依存システムの定義 コンテナの起動(stepsが開始される前に起動され、完了と共に破棄)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: miaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d miaos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:latest
        command: server /data
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        # >- : 改行はスペースに変換される CLI引数なので
        options: >-
          --health-cmd "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # ジョブのメイン処理
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        # | : 改行をそのまま保持 スクリプトとして複数行実行するので
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev postgresql-client

      # 高速なリンカーを使用
      - name: Install mold (Fast Linker)
        uses: rui314/setup-mold@v1

      # cargoを使えるようにしている(cargoを含むRustツールチェーン一式を用意)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
          components: rustfmt, clippy # 追加ツールの指定

      # キャッシュ機能を使ってビルド時間を短縮
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: orchestrator/backend

      # taiki-e/install-action を使用してバイナリを直接取得し、コンパイル時間を排除
      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      # DBマイグレーションを実行
      - name: Run database migrations
        run: sqlx migrate run

      # MinIOにテストデータを投入
      # repository/storageのテストで必要なため
      - name: Seed test object to MinIO
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: |
          aws s3 mb "s3://${MINIO_BUCKET_NAME}" --endpoint-url "${MINIO_ENDPOINT}" || true
          echo -n 'hello world' > /tmp/sample.log
          aws s3 cp /tmp/sample.log "s3://${MINIO_BUCKET_NAME}/test/sample.log" --endpoint-url "${MINIO_ENDPOINT}"

      # フォーマットが正しいかどうか
      - name: cargo fmt
        run: cargo fmt --all -- --check # --check: 正しくなくても書き換えない

      # コードの静的解析
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings # -D warnings: 警告もエラー扱い

      # テストを実行
      - name: cargo test
        run: cargo test --all-features -- --test-threads=1 # --test-threads=1: DB等があるのでテストを並列実行しない

      # OpenAPIの整合性確認
      - name: Check OpenAPI JSON sync
        run: |
          cargo run --bin generate_openapi > $GITHUB_WORKSPACE/schema/openapi.json
          git diff --exit-code || (echo "Error: openapi.json is out of sync. Please run schema generator locally and commit." && exit 1)

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    needs: paths
    if: needs.paths.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: orchestrator/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orchestrator/frontend/package-lock.json

      - run: npm ci
      
      # OpenAPIの整合性確認
      - name: Check OpenAPI difference
        run: |
          npx openapi-typescript $GITHUB_WORKSPACE/schema/openapi.json -o src/api/schema.d.ts 
          git diff --exit-code || (echo "Error: Frontend generated types are out of sync." && exit 1)

      - run: npm run lint
      - run: npm run build

  worker:
    name: Worker
    runs-on: ubuntu-latest
    needs: paths
    if: needs.paths.outputs.worker == 'true'
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      # uv インストール
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # 依存関係インストール
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # format check
      - name: Ruff format check
        # 生成ファイルは除外
        # --check: 修正はしない
        # --frozen: uv.lockとpyproject.tomlに不整合があった場合はエラーとなる
        run: uv run --frozen ruff format --check src

      # lint
      - name: Ruff check
        # 生成ファイルは除外
        run: uv run --frozen ruff check src

      # OpenAPIの整合性確認
      - name: Check OpenAPI difference
        run: |
          uv run --frozen openapi-python-client generate --meta none --output-path src/server_client --overwrite --path $GITHUB_WORKSPACE/schema/openapi.json
          git diff --exit-code || (echo "Error: Worker generated types are out of sync." && exit 1)