services:
  minio:
    volumes:
      - minio_data:/data

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"

  backend:
    restart: unless-stopped
    build:
      context: ./backend
      target: prod
    environment:
      - LOG_LEVEL=info

volumes:
  minio_data: