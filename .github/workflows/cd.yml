name: CD

# 並行実行の制御
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # CDはキャンセルしない 段階リリースのような順序補償が必要な場合がある 中断による不整合を防ぐ

on:
  # pushされた場合(mergeされたときにもトリガーされる)
  push:
    branches: [main]

permissions:
  contents: read
  packages: write  # ghcr.io push に必要


jobs:
  # ─────────────────────────────────────────
  # Workerマトリックスのセットアップジョブ
  # ─────────────────────────────────────────
  setup-worker-matrix:
    runs-on: ubuntu-latest
    outputs:
      # steps.set-matrixの出力結果をジョブ全体の出力として定義
      hosts: ${{ steps.set-matrix.outputs.hosts }}
    steps:
      - uses: actions/checkout@v4

      # validate
      - run: echo '${{ secrets.WORKER_HOSTS }}' | jq .

      - id: set-matrix
        # GITHUB_OUTPUT環境変数(出力ファイル)にキーと値のペアを追記し、後続ジョブに渡す
        run: echo "hosts=${{ secrets.WORKER_HOSTS }}" >> "$GITHUB_OUTPUT"


  # ─────────────────────────────────────────
  # イメージビルド & Push
  # ─────────────────────────────────────────
  build-orchestrator-backend:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      # ソースコードを実行環境にチェックアウト
      - uses: actions/checkout@v4
      # docker buildx(高性能ビルド環境)初期化
      - uses: docker/setup-buildx-action@v3
      # ghcr.ioにログイン
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # イメージのメタデータ自動生成
      - id: meta
        uses: docker/metadata-action@v5
        with:
          # push先のイメージ名
          images: ghcr.io/${{ github.repository }}/orchestrator-backend
          # sha: コミット単位で一意なハッシュを付与
          # latest: latestタグをつける 1つのタグは常に1つのイメージしかさせないため常に最新版を指す
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # イメージのビルド & push
      - id: build
        uses: docker/build-push-action@v6
        with:
          # ビルド対象
          context: orchestrator/backend
          target: prod
          push: true
          # メタデータで生成したタグを使用
          tags: ${{ steps.meta.outputs.tags }}
          # メタ情報 Git commit, repo URL など
          labels: ${{ steps.meta.outputs.labels }}
          # ビルドキャッシュを利用
          # gha: GitHub Actions専用のキャッシュストレージを使用,
          # max: ビルド途中の全てのレイヤーをキャッシュ対象に
          cache-from: type=gha,scope=build-orchestrator-backend
          cache-to: type=gha,mode=max,scope=build-orchestrator-backend


  build-orchestrator-frontend:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/orchestrator-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: orchestrator/frontend
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-orchestrator-frontend
          cache-to: type=gha,mode=max,scope=build-orchestrator-frontend

  build-worker:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/worker
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ito_research
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-worker
          cache-to: type=gha,mode=max,scope=build-worker

  # ─────────────────────────────────────────
  # Orchestrator デプロイ（1台）
  # ─────────────────────────────────────────
  deploy-orchestrator:
    needs: [build-orchestrator-backend, build-orchestrator-frontend]
    runs-on: ubuntu-latest
    environment: production  # GitHub Environment による手動承認ゲートを設定可能
    steps:
      - name: Deploy orchestrator
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.ORCHESTRATOR_HOST }}
          username: ${{ secrets.ORCHESTRATOR_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/miaos/orchestrator
            git pull origin main

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            # 新イメージを取得
            export IMAGE_TAG="${{ github.sha }}"
            docker compose -f compose.base.yaml -f compose.prod.yaml pull backend frontend

            # サービスを再起動（既存コンテナを置き換え）
            # --no-deps: 依存サービス(postgres等)は再起動しない
            # --remove-orphans: 不要なコンテナを削除
            docker compose -f compose.base.yaml -f compose.prod.yaml \
              up -d --no-deps --remove-orphans backend frontend

            # ヘルスチェック（backend が起動するまで待機）
            timeout 60 bash -c \
              'until docker compose -f compose.base.yaml -f compose.prod.yaml \
                ps backend | grep -q "healthy"; do sleep 3; done'
            
            # 不要になったイメージの削除
            # -a: 全てのイメージを削除
            # -f: 強制的に削除
            # --filter "dangling=true": 未使用のイメージを削除
            docker image prune -f --filter "dangling=true"

  # ─────────────────────────────────────────
  # Worker デプロイ（複数台）
  # ─────────────────────────────────────────
  deploy-workers:
    needs: [build-worker, setup-worker-matrix]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        # WORKER_HOSTS: GitHub Secret に JSON 配列で登録
        # 例: ["10.0.0.1", "10.0.0.2", "10.0.0.3"]
        # needsコンテキスト経由でセットアップジョブの出力(JSON配列)を参照し、パースする
        host: ${{ fromJSON(needs.setup-worker-matrix.outputs.hosts) }}
      # max-parallel: 1        # 1台ずつ順番にデプロイ 確実に1台は動作させたい時に使用
      fail-fast: false       # 1台失敗しても他の台はロールバックしない(全てデプロイを試みる)
    steps:
      - name: Graceful rolling deploy to ${{ matrix.host }}
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.WORKER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.DEPLOY_SSH_KEY }}
          # command_timeout: タスク完了待ちの上限（最長タスク時間 + バッファ）
          command_timeout: 1000m
          script: |
            set -euo pipefail
            cd /opt/miaos/worker
            git pull origin main

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin


            # 1. 新イメージを取得（実行中コンテナに影響なし）
            export IMAGE_TAG="${{ github.sha }}"
            docker compose -f compose.base.yaml -f compose.prod.yaml pull ito_research

            # 2. 現在のコンテナを graceful stop
            #    SIGTERM → Celery warm shutdown（実行中タスク完了後に終了）
            #    stop_grace_period をcompose.prod.yamlで設定しておくこと
            docker compose -f compose.base.yaml -f compose.prod.yaml stop ito_research

            # 3. 新イメージで起動
            docker compose -f compose.base.yaml -f compose.prod.yaml up -d --no-deps ito_research

            # 4. 不要になったイメージの削除
            docker image prune -f --filter "dangling=true"