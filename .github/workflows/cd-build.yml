name: CD Build

# semver tag push 時のみイメージをビルドする（本番リリースの正）
# release-please が PAT で tag を作成すると起動する（GITHUB_TOKEN の tag push では起動しない）

concurrency:
  group: cd-build-${{ github.ref }}
  cancel-in-progress: false # CDはキャンセルしない 段階リリースのような順序補償が必要な場合がある 中断による不整合を防ぐ

on:
  # semver tag push 時に起動
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # イメージビルド & Push
  # ─────────────────────────────────────────
  build-orchestrator-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io push / buildcache に必要
    steps:
      # ソースコードを実行環境にチェックアウト
      - uses: actions/checkout@v4
      # docker buildx(高性能ビルド環境)初期化
      - uses: docker/setup-buildx-action@v3
      # ghcr.ioにログイン
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR はリポジトリ名を小文字に正規化する
      - name: Set image repository
        run: echo "IMAGE_REPO=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # イメージのメタデータ自動生成
      - id: meta
        uses: docker/metadata-action@v5
        with: 
          # イメージの名前を指定
          images: ${{ env.REGISTRY }}/${{ github.repository }}/orchestrator-backend
          # sha: コミット単位で一意なハッシュを付与
          # latest: latestタグをつける 1つのタグは常に1つのイメージしかさせないため常に最新版を指す
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest 

      # イメージのビルドとpush
      - id: build
        uses: docker/build-push-action@v6
        with:
          # ビルド対象
          context: orchestrator/backend
          # ビルド環境
          target: prod
          push: true
          # メタデータで生成したタグを使用
          tags: ${{ steps.meta.outputs.tags }}
          # メタ情報 Git commit, repo URL など
          labels: ${{ steps.meta.outputs.labels }}
          # ビルドキャッシュ: GHCR の専用タグに read/write（tag 間・ブランチをまたいで共有可能）
          # mode=max: マルチステージの中間レイヤーも含めてキャッシュ
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}/orchestrator-backend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}/orchestrator-backend:buildcache,mode=max

  build-orchestrator-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io push / buildcache に必要
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image repository
        run: echo "IMAGE_REPO=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/orchestrator-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: orchestrator/frontend
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}/orchestrator-frontend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}/orchestrator-frontend:buildcache,mode=max

  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io push / buildcache に必要
    steps:
      - uses: actions/checkout@v4
      # arm64 ワーカー向けクロスビルド用（ubuntu-latest は amd64）
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image repository
        run: echo "IMAGE_REPO=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/worker
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: worker
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}/worker:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}/worker:buildcache,mode=max
