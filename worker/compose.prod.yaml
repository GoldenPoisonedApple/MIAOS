services:
  ito_research:
    # まだGHCRにはpushしてない
    # image: ghcr.io/<org>/miaos-worker:${TAG:-latest}       
    build:
      target: prod

    # タスク保護
    stop_grace_period: 1h
    volumes:
      - miaos_worker_data:/workspace/data # データセット
      - miaos_worker_cache:/workspace/cache # キャッシュ(他の実験結果など)

volumes:
  miaos_worker_data:
  miaos_worker_cache:
