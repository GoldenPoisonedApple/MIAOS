name: CD Deploy

# CD Build 完了後に本番へデプロイする
# CD Build は semver tag push 時のみ走るため、本番更新も Release 時のみ

concurrency:
  group: cd-deploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

on:
  # CD Build というWorkflowが完了したら起動
  workflow_run:
    workflows: [CD Build]
    types: [completed]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # 複数台のワーカーをデプロイするためのmatrixを作成
  # ─────────────────────────────────────────
  setup-worker-matrix:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      # steps.set-matrixの出力結果をジョブ全体の出力として定義
      hosts: ${{ steps.set-matrix.outputs.hosts }}
    steps:
      # validate
      # JSON配列 かつ 要素数が0より大きいかどうかをチェック
      - run: |
          echo '${{ vars.WORKER_HOSTS }}' | jq -e 'type == "array" and length > 0'
      - id: set-matrix
        # GITHUB_OUTPUT環境変数(出力ファイル)にキーと値のペアを追記し、後続ジョブに渡す
        run: echo "hosts=$(echo '${{ vars.WORKER_HOSTS }}' | jq -c '.')" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────
  # デプロイ
  # ─────────────────────────────────────────
  deploy-orchestrator:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy orchestrator
        uses: appleboy/ssh-action@v1
        # ランナー側の環境変数を指定
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ github.repository }}
        with:
          host: ${{ secrets.ORCHESTRATOR_HOST }}
          username: ${{ secrets.ORCHESTRATOR_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_port: ${{ secrets.BASTION_PORT }}
          # ワークフローのenvはリモートに渡されないので明示的に指定
          envs: GITHUB_SHA,GITHUB_TOKEN,GITHUB_ACTOR,REGISTRY,IMAGE_PREFIX
          script: |
            set -euo pipefail
            mkdir -p "$HOME/MIAOS/"
            cd "$HOME/MIAOS/"
            git fetch origin
            git checkout "${GITHUB_SHA}"
            bash .github/scripts/deploy-orchestrator.sh

  # ─────────────────────────────────────────
  # Worker デプロイ（複数台）
  # ─────────────────────────────────────────
  deploy-workers:
    needs: setup-worker-matrix
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    # strategy はワークフローのプランニング段階で評価される
    # environment: production が指定されたジョブの環境変数は、ジョブ実行時にのみ解決されるため、strategy.matrix の時点では vars.WORKER_HOSTS が空になる
    strategy:
      matrix:
        # WORKER_HOSTS: GitHub Variable に JSON 配列で登録: Secretでも結局Actionsの所に表示されるので
        # 例: ["10.0.0.1", "10.0.0.2", "10.0.0.3"]
        host: ${{ fromJSON(needs.setup-worker-matrix.outputs.hosts) }}
      # max-parallel: 1        # 1台ずつ順番にデプロイ 確実に1台は動作させたい時に使用
      fail-fast: false       # 1台失敗しても他の台はロールバックしない(全てデプロイを試みる)
    steps:
      - name: Graceful rolling deploy to ${{ matrix.host }}
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ github.repository }}
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.WORKER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.DEPLOY_SSH_KEY }}
          proxy_port: ${{ secrets.BASTION_PORT }}
          # ワークフローのenvはリモートに渡されないので明示的に指定
          envs: GITHUB_SHA,GITHUB_TOKEN,GITHUB_ACTOR,REGISTRY,IMAGE_PREFIX
          # command_timeout: タスク完了待ちの上限（最長タスク時間 + バッファ）
          command_timeout: 60m
          script: |
            set -euo pipefail
            mkdir -p "$HOME/MIAOS/"
            cd "$HOME/MIAOS/"
            git fetch origin
            git checkout "${GITHUB_SHA}"
            bash .github/scripts/deploy-worker.sh
