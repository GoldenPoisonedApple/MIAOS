name: CD Retag GHCR Images

# CD Build 完了後に semver タグを GHCR イメージへ付与する
# release-please の retag ジョブにあったポーリング待機を workflow_run で置き換え

concurrency:
  group: cd-retag-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

on:
  # CD Build というWorkflowが完了したら起動
  workflow_run:
    workflows: [CD Build]
    types: [completed]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  retag-ghcr-images:
    # tag push 起動の CD Build 成功時のみ（head_branch = semver tag 名）
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # リリースバージョンにタグ付与
      - name: Tag images with release version
        env:
          TAG_NAME: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          REPOSITORY="${{ github.repository }}"
          REPOSITORY="${REPOSITORY,,}" # Docker/OCIの参照形式は小文字必須
          REGISTRY="${{ env.REGISTRY }}/${REPOSITORY}"
          for img in orchestrator-backend orchestrator-frontend worker; do
            docker buildx imagetools create \
              --tag "${REGISTRY}/${img}:${TAG_NAME}" \
              "${REGISTRY}/${img}:${SHORT_SHA}"
          done
