services:
  ito_research:
    init: true  # ゾンビプロセスを防ぐ
    # 共有メモリサイズ (--shm-size=8g) PyTorchのDataLoader等で必須
    shm_size: 8gb
    
    environment:
      PYTHONPATH: /workspace
      TZ: Asia/Tokyo
      PC_NAME: ${PC_NAME}
      REDIS_URL: ${REDIS_URL}
      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MIAOS_API_URL: ${MIAOS_API_URL}
      OPENAPI_URL: ${OPENAPI_URL}
      
    # GPUの割り当て (--gpus all)
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "uv run --frozen celery -A src.workers.celery_tasks inspect ping --timeout 10 2>/dev/null | grep -q 'pong'"]
      interval: 5s
      timeout: 10s
      retries: 6
      start_period: 30s
