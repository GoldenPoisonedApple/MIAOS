name: CD Build

# Release PR merge 時のみイメージをビルドする（通常の main push では実行しない）
# release-please が CHANGELOG / manifest を更新するコミットをトリガーとする

concurrency:
  group: cd-build-${{ github.ref }}
  cancel-in-progress: false # CDはキャンセルしない 段階リリースのような順序補償が必要な場合がある 中断による不整合を防ぐ

on:
  # pushされた場合(mergeされたときにもトリガーされる)
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # イメージビルド & Push
  # ─────────────────────────────────────────
  build-orchestrator-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io push に必要
      actions: write # GHA build cache
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      # ソースコードを実行環境にチェックアウト
      - uses: actions/checkout@v4
      # docker buildx(高性能ビルド環境)初期化
      - uses: docker/setup-buildx-action@v3
      # ghcr.ioにログイン
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # イメージのメタデータ自動生成
      - id: meta
        uses: docker/metadata-action@v5
        with: 
          # イメージの名前を指定
          images: ${{ env.REGISTRY }}/${{ github.repository }}/orchestrator-backend
          # sha: コミット単位で一意なハッシュを付与
          # latest: latestタグをつける 1つのタグは常に1つのイメージしかさせないため常に最新版を指す
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest 

      # イメージのビルドとpush
      - id: build
        uses: docker/build-push-action@v6
        with:
          # ビルド対象
          context: orchestrator/backend
          # ビルド環境
          target: prod
          push: true
          # メタデータで生成したタグを使用
          tags: ${{ steps.meta.outputs.tags }}
          # メタ情報 Git commit, repo URL など
          labels: ${{ steps.meta.outputs.labels }}
          # ビルドキャッシュを利用
          # gha: GitHub Actions専用のキャッシュストレージを使用,
          # max: ビルド途中の全てのレイヤーをキャッシュ対象に
          cache-from: type=gha,scope=build-orchestrator-backend
          cache-to: type=gha,mode=max,scope=build-orchestrator-backend

  build-orchestrator-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io push に必要
      actions: write # GHA build cache
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/orchestrator-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: orchestrator/frontend
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-orchestrator-frontend
          cache-to: type=gha,mode=max,scope=build-orchestrator-frontend

  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io push に必要
      actions: write # GHA build cache
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/worker
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: worker
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-worker
          cache-to: type=gha,mode=max,scope=build-worker
